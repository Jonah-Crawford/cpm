<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CPM Registry</title>
</head>
<style>
  @font-face {
    font-family: "CrawFont";
    src: url("fonts/craw_font.ttf") format("truetype");
    font-weight: normal;
    font-style: normal;
  }

  body {
    background-color: #444477;
    font-family: Calibri;
  }

  code {
    color: #ffffff;
  }

  h2 {
    color: #ccccff;
  }

  .title {
    background-color: #222255;
  }

  .title_text {
    color: #ccccff;
    font-family: "CrawFont";
    font-weight: 400;
  }

  .packages {
    display: grid;
    gap: 18px;
  }

  .package_card {
    padding: 24px;
    border: 1px solid #263044;
    border-radius: 18px;
    background: #10141f;
  }

  .package_card h3 {
    margin-top: 0;
    font-size: 1.5rem;
    color: #ccccff;
  }

  .package_card p {
    color: #ccccff;
  }

  .meta {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    color: #aab6d3;
    margin-bottom: 14px;
  }

  .error {
    color: #ff9a9a;
  }

</style>
<body>
  <main>
    <section class="title">
      <h1 class="title_text">Crawssembly Package Manager</h1>
    </section>

    <section>
      <h2>Packages</h2>
      <div id="packages" class="packages"></div>
    </section>

  </main>

  <script>

    async function loadPackages() {
      const container = document.getElementById("packages");

      try {
        const res = await fetch("/api/packages");

        if (!res.ok) {
          throw new Error(await res.text());
        }

        const packages = await res.json();

        if (packages.length === 0) {
          container.innerHTML = "<p>No packages published yet.</p>";
          return;
        }

        container.innerHTML = packages.map(pkg => `
          <article class="package_card">
            <h3>${escapeHtml(pkg.name)}</h3>
            <p>${escapeHtml(pkg.description || "No description provided.")}</p>
            <div class="meta">
              <span>Latest: ${escapeHtml(pkg.latest || "none")}</span>
              <span>Author: ${escapeHtml(pkg.author || "unknown")}</span>
            </div>
            <code>craw pkg install ${escapeHtml(pkg.name)}</code>
          </article>
        `).join("");
      } catch (err) {
        container.innerHTML = `<p class="error">Failed to load packages: ${escapeHtml(err.message)}</p>`;
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadPackages();

  </script>

</body>
</html>
