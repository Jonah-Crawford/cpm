<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CPM – Crawssembly Package Manager</title>
        <link rel="stylesheet" href="/output.css" />
        <script>
            if (
                localStorage.theme === "dark" ||
                (!("theme" in localStorage) &&
                    window.matchMedia("(prefers-color-scheme: dark)").matches)
            ) {
                document.documentElement.classList.add("dark");
            } else {
                document.documentElement.classList.remove("dark");
            }
        </script>
    </head>
    <body
        class="min-h-screen bg-background text-foreground antialiased selection:bg-primary selection:text-primary-foreground"
    >
        <header
            class="sticky top-0 z-50 w-full border-b-2 border-border bg-background/95 backdrop-blur supports-[backdrop-filter]:bg-background/80"
        >
            <div
                class="container mx-auto flex h-16 items-center justify-between px-4"
            >
                <a
                    href="/"
                    class="flex items-center gap-3 font-mono text-xl font-bold tracking-tight transition-opacity hover:opacity-80"
                >
                    <img
                        src="/craw.png"
                        alt="CPM Logo"
                        class="h-8 w-8 dark:invert"
                    />
                    <span>CPM</span>
                </a>

                <nav class="flex items-center gap-4">
                    <button
                        id="theme-toggle"
                        class="flex items-center justify-center border-2 border-border bg-card p-2 text-foreground transition-all hover:-translate-y-0.5 hover:shadow-[2px_2px_0_0_var(--theme-primary,theme(colors.primary.DEFAULT))] focus:outline-none"
                        aria-label="Toggle theme"
                    >
                        <svg
                            id="theme-toggle-light-icon"
                            class="hidden h-5 w-5"
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <circle cx="12" cy="12" r="4" />
                            <path d="M12 2v2" />
                            <path d="M12 20v2" />
                            <path d="m4.93 4.93 1.41 1.41" />
                            <path d="m17.66 17.66 1.41 1.41" />
                            <path d="M2 12h2" />
                            <path d="M20 12h2" />
                            <path d="m6.34 17.66-1.41 1.41" />
                            <path d="m19.07 4.93-1.41 1.41" />
                        </svg>
                        <svg
                            id="theme-toggle-dark-icon"
                            class="hidden h-5 w-5"
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                        </svg>
                    </button>

                    <a
                        href="https://github.com/Jonah-Crawford/cpm"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="text-muted-foreground hover:text-foreground transition-colors"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="24"
                            height="24"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path
                                d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"
                            />
                            <path d="M9 18c-4.51 2-5-2-7-2" />
                        </svg>
                        <span class="sr-only">GitHub</span>
                    </a>
                </nav>
            </div>
        </header>

        <section
            class="border-b-2 border-border bg-muted/20 relative overflow-hidden"
        >
            <div
                class="absolute inset-0 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px]"
            ></div>

            <div
                class="container mx-auto px-4 py-24 text-center max-w-3xl relative z-10"
            >
                <div class="mx-auto mb-8 flex justify-center">
                    <img
                        src="/craw.png"
                        alt="CPM Logo"
                        class="h-28 w-28 drop-shadow-xl dark:invert"
                    />
                </div>
                <h1
                    class="text-4xl font-black tracking-tight sm:text-6xl font-mono uppercase"
                >
                    Crawssembly
                    <span class="block text-primary">Package Manager</span>
                </h1>
                <p
                    class="mt-6 text-lg text-muted-foreground max-w-xl mx-auto font-medium"
                >
                    The official package registry. Discover, publish, and
                    install packages for the Crawssembly ecosystem.
                </p>
                <div class="mt-10 flex items-center justify-center gap-3">
                    <div
                        class="flex items-center border-2 border-border bg-card shadow-[4px_4px_0_0_var(--theme-primary,theme(colors.primary.DEFAULT))]"
                    >
                        <code
                            class="px-6 py-3 font-mono text-sm font-bold text-foreground"
                        >
                            craw pkg install &lt;package&gt;
                        </code>
                    </div>
                </div>
            </div>
        </section>

        <main class="container mx-auto px-4 py-16">
            <div
                class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between"
            >
                <h2
                    class="text-2xl font-bold tracking-tight font-mono uppercase"
                >
                    Packages
                </h2>

                <div class="flex items-center gap-4">
                    <div class="relative w-full sm:w-80">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"
                        >
                            <circle cx="11" cy="11" r="8" />
                            <path d="m21 21-4.3-4.3" />
                        </svg>
                        <input
                            type="search"
                            id="search-input"
                            placeholder="Search registry..."
                            class="w-full border-2 border-border bg-background py-2 pl-10 pr-4 font-mono text-sm outline-none transition-all focus:border-primary focus:shadow-[2px_2px_0_0_var(--theme-primary,theme(colors.primary.DEFAULT))]"
                        />
                    </div>
                    <span
                        id="package-count"
                        class="text-sm font-mono font-bold text-muted-foreground whitespace-nowrap bg-muted px-3 py-1 border-2 border-border"
                    ></span>
                </div>
            </div>

            <div
                id="loading-skeleton"
                class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3"
            >
                <div
                    class="rounded-none border-2 border-border bg-card p-6 animate-pulse shadow-[4px_4px_0_0_rgba(0,0,0,0.1)]"
                >
                    <div class="mb-3 h-6 w-32 bg-muted"></div>
                    <div class="mb-2 h-4 w-full bg-muted"></div>
                    <div class="mb-6 h-4 w-3/4 bg-muted"></div>
                    <div class="mt-auto h-10 w-full bg-muted"></div>
                </div>
                <div
                    class="rounded-none border-2 border-border bg-card p-6 animate-pulse shadow-[4px_4px_0_0_rgba(0,0,0,0.1)]"
                >
                    <div class="mb-3 h-6 w-40 bg-muted"></div>
                    <div class="mb-2 h-4 w-full bg-muted"></div>
                    <div class="mb-6 h-4 w-1/2 bg-muted"></div>
                    <div class="mt-auto h-10 w-full bg-muted"></div>
                </div>
                <div
                    class="rounded-none border-2 border-border bg-card p-6 animate-pulse shadow-[4px_4px_0_0_rgba(0,0,0,0.1)]"
                >
                    <div class="mb-3 h-6 w-28 bg-muted"></div>
                    <div class="mb-2 h-4 w-full bg-muted"></div>
                    <div class="mb-6 h-4 w-2/3 bg-muted"></div>
                    <div class="mt-auto h-10 w-full bg-muted"></div>
                </div>
            </div>

            <div
                id="error-state"
                class="hidden border-2 border-destructive bg-destructive/10 p-8 text-center shadow-[4px_4px_0_0_theme(colors.destructive.DEFAULT)]"
            >
                <p
                    id="error-message"
                    class="text-sm font-bold font-mono text-destructive"
                ></p>
                <button
                    onclick="loadPackages()"
                    class="mt-4 border-2 border-destructive bg-background px-6 py-2 font-mono text-sm font-bold text-destructive hover:bg-destructive hover:text-destructive-foreground transition-colors"
                >
                    RETRY
                </button>
            </div>

            <div
                id="empty-state"
                class="hidden border-2 border-border bg-card p-16 text-center border-dashed"
            >
                <h3 class="text-xl font-bold font-mono uppercase">
                    No packages found
                </h3>
                <p class="mt-2 text-sm text-muted-foreground font-mono">
                    Try adjusting your search or publish a new package.
                </p>
            </div>

            <div
                id="packages"
                class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3"
            ></div>
        </main>

        <footer class="border-t-2 border-border bg-muted/20 mt-12">
            <div
                class="container mx-auto flex h-16 items-center justify-between px-4 text-xs font-mono font-bold text-muted-foreground uppercase"
            >
                <p>CPM Registry</p>
                <p>
                    <a
                        href="https://github.com/Jonah-Crawford/cpm"
                        class="hover:text-foreground hover:underline decoration-2 underline-offset-4"
                        >Source</a
                    >
                </p>
            </div>
        </footer>

        <script>
            // --- Theme Toggle Logic ---
            const themeToggleBtn = document.getElementById("theme-toggle");
            const darkIcon = document.getElementById("theme-toggle-dark-icon");
            const lightIcon = document.getElementById(
                "theme-toggle-light-icon",
            );

            if (document.documentElement.classList.contains("dark")) {
                lightIcon.classList.remove("hidden");
            } else {
                darkIcon.classList.remove("hidden");
            }

            themeToggleBtn.addEventListener("click", function () {
                darkIcon.classList.toggle("hidden");
                lightIcon.classList.toggle("hidden");

                if (document.documentElement.classList.contains("dark")) {
                    document.documentElement.classList.remove("dark");
                    localStorage.theme = "light";
                } else {
                    document.documentElement.classList.add("dark");
                    localStorage.theme = "dark";
                }
            });

            // --- Package Loading Logic ---
            let allPackages = [];

            async function loadPackages() {
                const container = document.getElementById("packages");
                const skeleton = document.getElementById("loading-skeleton");
                const errorState = document.getElementById("error-state");
                const emptyState = document.getElementById("empty-state");
                const searchInput = document.getElementById("search-input");

                skeleton.classList.remove("hidden");
                errorState.classList.add("hidden");
                emptyState.classList.add("hidden");
                container.innerHTML = "";

                try {
                    const res = await fetch("/api/packages");
                    if (!res.ok) throw new Error(await res.text());

                    allPackages = await res.json();
                    skeleton.classList.add("hidden");

                    searchInput.addEventListener("input", (e) =>
                        renderPackages(e.target.value),
                    );
                    renderPackages();
                } catch (err) {
                    skeleton.classList.add("hidden");
                    errorState.classList.remove("hidden");
                    document.getElementById("error-message").textContent =
                        `ERR: ${escapeHtml(err.message)}`;
                }
            }

            function renderPackages(filterQuery = "") {
                const container = document.getElementById("packages");
                const emptyState = document.getElementById("empty-state");
                const countEl = document.getElementById("package-count");

                const query = filterQuery.toLowerCase().trim();
                const filtered = allPackages.filter((pkg) => {
                    if (!query) return true;
                    return (
                        pkg.name.toLowerCase().includes(query) ||
                        (pkg.description &&
                            pkg.description.toLowerCase().includes(query))
                    );
                });

                if (filtered.length === 0) {
                    emptyState.classList.remove("hidden");
                    container.innerHTML = "";
                    countEl.textContent = "0";
                    return;
                }

                emptyState.classList.add("hidden");
                countEl.textContent = filtered.length;

                container.innerHTML = filtered
                    .map((pkg) => {
                        const dateStr = pkg.published_at
                            ? new Date(
                                  pkg.published_at.replace(" ", "T") + "Z",
                              ).toLocaleDateString(undefined, {
                                  year: "numeric",
                                  month: "short",
                                  day: "numeric",
                              })
                            : "Unknown Date";

                        return `
                        <article class="group relative flex flex-col border-2 border-border bg-card p-6 transition-all hover:-translate-y-1 hover:shadow-[4px_4px_0_0_var(--theme-primary,theme(colors.primary.DEFAULT))]">
                            <div class="mb-3 flex items-start justify-between">
                                <h3 class="text-xl font-bold font-mono tracking-tight">${escapeHtml(pkg.name)}</h3>
                                ${pkg.latest ? `<span class="bg-primary text-primary-foreground px-2 py-0.5 text-xs font-bold uppercase tracking-wider">v${escapeHtml(pkg.latest)}</span>` : ""}
                            </div>

                            <p class="mb-6 flex-1 text-sm text-muted-foreground leading-relaxed line-clamp-3">
                                ${escapeHtml(pkg.description || "No description provided.")}
                            </p>

                            <div class="mt-auto flex flex-col gap-4 border-t-2 border-border pt-4">
                                <div class="flex items-center justify-between text-xs font-mono font-bold text-muted-foreground uppercase tracking-wide">
                                    <span>${pkg.author ? `<span class="opacity-50">BY</span> ${escapeHtml(pkg.author)}` : ""}</span>
                                    <span class="opacity-70">${escapeHtml(dateStr)}</span>
                                </div>

                                <div class="flex items-center border-2 border-border bg-background">
                                    <code class="px-3 py-1.5 text-xs font-mono text-foreground/80 border-r-2 border-border select-all w-full overflow-hidden text-ellipsis whitespace-nowrap">craw pkg install ${escapeHtml(pkg.name)}</code>
                                    <button
                                        onclick="copyToClipboard(this, 'craw pkg install ${escapeHtml(pkg.name)}')"
                                        class="px-3 py-1.5 text-xs font-bold font-mono hover:bg-primary hover:text-primary-foreground transition-colors w-[72px] text-center shrink-0"
                                        title="Copy to clipboard"
                                    >
                                        COPY
                                    </button>
                                </div>
                            </div>
                        </article>
                    `;
                    })
                    .join("");
            }

            function copyToClipboard(buttonElement, text) {
                navigator.clipboard.writeText(text).then(() => {
                    buttonElement.innerText = "COPIED!";
                    buttonElement.classList.add(
                        "bg-primary",
                        "text-primary-foreground",
                    );

                    setTimeout(() => {
                        buttonElement.innerText = "COPY";
                        buttonElement.classList.remove(
                            "bg-primary",
                            "text-primary-foreground",
                        );
                    }, 2000);
                });
            }

            function escapeHtml(value) {
                return String(value)
                    .replaceAll("&", "&amp;")
                    .replaceAll("<", "&lt;")
                    .replaceAll(">", "&gt;")
                    .replaceAll('"', "&quot;")
                    .replaceAll("'", "&#039;");
            }

            // Init
            loadPackages();
        </script>
    </body>
</html>
